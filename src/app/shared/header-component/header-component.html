<header class="structure">
  <div class="max-width">
    <nav id="nav-element" class="padding">
      <div id="logo">
        <img src="assets/img/logo.png" alt="Logo" />
      </div>

      <div id="language">
        <button (click)="useLanguage('de')" [class.active]="currentLanguage === 'de'">DE</button>
        <button (click)="useLanguage('en')" [class.active]="currentLanguage === 'en'">EN</button>
      </div>

      <section id="burger-menu">
        <button
          class="navBtn4"
          commandFor="dialog-menu"
          (click)="navClick()"
        >
          <div class="icon-container"></div>
        </button>
      </section>
    </nav>

    <!-- TESTAREA -->

    <dialog id="dialog-menu" [open]="isMenuOpen">
      <div id="dialog-content">
        <ul>
          <li>
            <a  href="#about-me">{{ 'header.about-me' | translate }}</a>
          </li>
          <li>
            <a  href="#my-skills">{{ 'header.my-skills' | translate }}</a>
          </li>
          <li>
            <a  href="#portfolio">{{ 'header.portfolio' | translate }}</a>
          </li>
        </ul>
      </div>
    </dialog>

  </div>
</header>
